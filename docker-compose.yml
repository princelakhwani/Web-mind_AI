version: "3.9"

services:

  backend:
    build: ./backend
    container_name: webmind-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    container_name: webmind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped